<div class="container my-5">
  <div class="card shadow-lg p-4 text-center">
    <h3 class="text-success mb-3">
      <i class="bi bi-bag-check primary"></i> ¡Pago Exitoso!
    </h3>
    <p>Tu pedido ha sido realizado exitosamente.</p>

    <div *ngIf="orderId" class="mt-3">
      <h5><strong>ID del Pedido:</strong> {{ orderId }}</h5>
      <h5>
        <strong>Total Facturado:</strong>
        S/ {{ totalAmount | number:'1.2-2' }}
      </h5>
      <h6 class="mt-3">
        <strong>Dirección de Entrega:</strong> {{ deliveryAddress }}
      </h6>
    </div>

    <button class="btn btn-primary mt-4" routerLink="/home">
      Continuar Comprando
    </button>
  </div>
</div>
