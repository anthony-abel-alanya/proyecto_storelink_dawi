<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">Administrar Productos</h3>
    <div class="input-group w-50">
      <span class="input-group-text">Buscar</span>
      <input
        type="text"
        class="form-control"
        placeholder="Nombre del producto"
        [(ngModel)]="searchTerm"
        (ngModelChange)="search()"
      />
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="loading" class="alert alert-info">Cargando productos...</div>

  <div class="table-responsive">
    <table class="table table-bordered table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Stock</th>
          <th>Precio</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of displayedProducts">
          <td>{{ product.productId }}</td>
          <td>{{ product.productName }}</td>
          <td>{{ product.quantity }}</td>
          <td>S/ {{ product.price | number:'1.2-2' }}</td>
          <td class="text-center">
            <button
              type="button"
              class="btn btn-sm btn-primary me-2"
              (click)="editProduct(product.productId!)"
            >
              Editar
            </button>
            <button
              type="button"
              class="btn btn-sm btn-danger"
              (click)="deleteProduct(product.productId!)"
            >
              Eliminar
            </button>
          </td>
        </tr>
        <tr *ngIf="!loading && displayedProducts.length === 0">
          <td colspan="5" class="text-center py-4">No se encontraron productos.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
