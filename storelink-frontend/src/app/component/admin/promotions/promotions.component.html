<div class="container my-4">
  <!-- CREATE NEW PROMOTION FORM -->
  <div class="card mb-4 shadow-sm">
    <div class="card-header bg-primary text-white">
      <h5>Crear Nueva Promoción de Categoría</h5>
    </div>
    <div class="card-body">
      <form
        #promoForm="ngForm"
        (ngSubmit)="createPromotion(promoForm)"
        novalidate
      >
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Categoría</label>
            <select
              class="form-select"
              required
              [(ngModel)]="selectedCategoryId"
              name="category"
              #category="ngModel"
            >
              <option [ngValue]="null" disabled selected>
                Seleccionar categoría
              </option>
              <option *ngFor="let category of categories" [ngValue]="category.id">
                {{ category.name }}
              </option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Descuento (%)</label>
            <input
              type="number"
              class="form-control"
              required
              min="0.1"
              max="100"
              [(ngModel)]="newPromotion.discountPercentage"
              name="discountPercentage"
              #discount="ngModel"
            />
          </div>

          <div class="col-md-3">
            <label class="form-label">Fecha de Inicio</label>
            <input
              type="date"
              class="form-control"
              required
              [(ngModel)]="newPromotion.startDate"
              name="startDate"
              #startDate="ngModel"
            />
          </div>

          <div class="col-md-3">
            <label class="form-label">Fecha de Fin</label>
            <input
              type="date"
              class="form-control"
              required
              [(ngModel)]="newPromotion.endDate"
              name="endDate"
              #endDate="ngModel"
            />
          </div>
        </div>

        <div class="mt-3">
          <button class="btn btn-success" type="submit">
            Crear Promoción
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- PROMOTIONS TABLE -->
  <div class="card shadow-sm">
    <div class="card-header bg-secondary text-white">
      <h5>Todas las Promociones</h5>
    </div>
    <div class="card-body">
      <table class="table table-bordered table-hover">
        <thead class="table-light">
          <tr>
            <th>Categoría</th>
            <th>Descuento (%)</th>
            <th>Fecha de Inicio</th>
            <th>Fecha de Fin</th>
            <th>Activo</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let promo of promotions">
            <td>{{ promo.categoryName }}</td>
            <td>{{ promo.discountPercentage }}</td>
            <td>{{ promo.startDate | date:'dd/MM/yyyy' }}</td>
            <td>{{ promo.endDate | date:'dd/MM/yyyy' }}</td>
            <td>
              <span
                class="badge"
                [ngClass]="getStatusClass(promo)"
              >
                {{ getStatusText(promo) }}
              </span>
            </td>
            <td>
              <!-- 
              <button
                class="btn btn-sm btn-warning me-2"
                *ngIf="promo.active"
                (click)="stopPromotion(promo)"
              >
                Stop
              </button>
              -->

              <button
                class="btn btn-sm btn-danger"
                (click)="deletePromotion(promo)"
              >
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
