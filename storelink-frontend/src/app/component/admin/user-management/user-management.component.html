<div class="container py-5">

  <!-- Header -->
  <div class="text-center mb-4">
    <h2 class="fw-bold mb-1">Gestión de Cuentas de Usuario</h2>
    <p class="text-muted mb-0">
      Administra las cuentas de los clientes (el administrador no aparece en esta lista)
    </p>
  </div>

  <!-- Alerts -->
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div *ngIf="successMessage" class="alert alert-success text-center shadow-sm">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger text-center shadow-sm">
        {{ errorMessage }}
      </div>

      <!-- Loading -->
      <div *ngIf="loading" class="text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="mt-2 text-muted">Cargando usuarios...</div>
      </div>

      <!-- Card Table -->
      <div *ngIf="!loading" class="card border-0 shadow-sm">

        <div class="card-body p-0">

          <div *ngIf="users.length > 0; else noUsers" class="table-responsive">

            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th class="px-4">Email</th>
                  <th>Estado</th>
                  <th class="text-end px-4">Acción</th>
                </tr>
              </thead>

              <tbody>
                <tr *ngFor="let user of users">
                  <td class="px-4">
                    <div class="fw-semibold">{{ user.email }}</div>
                  </td>

                  <td>
                    <span
                      class="badge px-3 py-2"
                      [ngClass]="user.enabled ? 'bg-success' : 'bg-secondary'">
                      {{ getStatusText(user.enabled) }}
                    </span>
                  </td>

                  <td class="text-end px-4">
                    <button
                      class="btn btn-sm"
                      [ngClass]="user.enabled ? 'btn-outline-danger' : 'btn-outline-success'"
                      (click)="toggleUserStatus(user)">
                      {{ user.enabled ? 'Bloquear' : 'Desbloquear' }}
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>

          </div>

          <!-- Empty state -->
          <ng-template #noUsers>
            <div class="text-center py-5">
              <div class="text-muted">No hay usuarios registrados.</div>
            </div>
          </ng-template>

        </div>
      </div>

    </div>
  </div>
</div>
