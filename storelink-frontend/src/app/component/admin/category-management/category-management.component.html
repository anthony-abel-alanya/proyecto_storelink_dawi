<div class="container py-5">

  <!-- Header -->
  <div class="text-center mb-4">
    <h2 class="fw-bold mb-1">Gestión de Categorías</h2>
    <p class="text-muted mb-0">Crea, edita y administra las categorías del sistema</p>
  </div>

  <!-- Alerts -->
  <div class="row justify-content-center">
    <div class="col-lg-9">

      <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        {{ successMessage }}
        <button type="button" class="btn-close" (click)="successMessage = ''"></button>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        {{ errorMessage }}
        <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
      </div>

      <!-- Create category -->
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">➕ Crear Nueva Categoría</h5>
        </div>

        <div class="card-body">
          <form #categoryForm="ngForm" (ngSubmit)="createCategory(categoryForm)" novalidate>

            <div class="row g-3 align-items-end">

              <div class="col-md-9">
                <label class="form-label fw-semibold">Nombre de la categoría</label>
                <input
                  type="text"
                  class="form-control form-control-lg"
                  required
                  [(ngModel)]="newCategory.name"
                  name="name"
                  #name="ngModel"
                  placeholder="Coloca el nombre de la categoría"
                />
              </div>

              <div class="col-md-3">
                <button class="btn btn-success btn-lg w-100 fw-semibold" type="submit">
                  Crear
                </button>
              </div>

            </div>

          </form>
        </div>
      </div>

      <!-- TABLE -->
      <div class="card border-0 shadow-sm">

        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">📂 Categorías existentes</h5>
        </div>

        <div class="card-body p-0">

          <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

              <thead class="table-light">
                <tr>
                  <th class="px-4">ID</th>
                  <th>Nombre</th>
                  <th class="text-end px-4">Acciones</th>
                </tr>
              </thead>

              <tbody>

                <tr *ngFor="let category of categories">

                  <!-- EDIT MODE -->
                  <ng-container *ngIf="editingCategory?.id === category.id; else viewMode">

                    <td class="px-4">{{ category.id }}</td>

                    <td>
                      <input
                        type="text"
                        class="form-control form-control-sm"
                        [(ngModel)]="editedName"
                      />
                    </td>

                    <td class="text-end px-4">
                      <div class="btn-group">

                        <button class="btn btn-success btn-sm" (click)="saveEdit()">
                          ✔ Guardar
                        </button>

                        <button class="btn btn-secondary btn-sm" (click)="cancelEdit()">
                          ✖ Cancelar
                        </button>

                      </div>
                    </td>

                  </ng-container>

                  <!-- VIEW MODE -->
                  <ng-template #viewMode>

                    <td class="px-4 fw-semibold">{{ category.id }}</td>
                    <td>{{ category.name }}</td>

                    <td class="text-end px-4">
                      <div class="btn-group">

                        <button class="btn btn-outline-primary btn-sm" (click)="startEdit(category)">
                          ✏ Editar
                        </button>

                        <button class="btn btn-outline-danger btn-sm" (click)="deleteCategory(category)">
                          🗑 Eliminar
                        </button>

                      </div>
                    </td>

                  </ng-template>

                </tr>

                <!-- EMPTY STATE -->
                <tr *ngIf="categories.length === 0">
                  <td colspan="3" class="text-center py-5 text-muted">
                    <div>No hay categorías creadas</div>
                  </td>
                </tr>

              </tbody>

            </table>

          </div>

        </div>
      </div>

    </div>
  </div>
</div>
