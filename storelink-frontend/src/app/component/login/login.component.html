<div class="d-flex justify-content-center align-items-center vh-100 bg-light">

  <div class="card border-0 shadow-lg p-4" style="width: 420px; border-radius: 12px;">

    <!-- HEADER -->
    <div class="text-center mb-4">
      <h3 class="fw-bold mb-1">Iniciar Sesión</h3>
      <small class="text-muted">Accede a tu panel de gestión</small>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>

        <div class="input-group">
          <span class="input-group-text">📧</span>
          <input
            type="email"
            name="email"
            class="form-control"
            placeholder="ejemplo@mail.com"
            [(ngModel)]="loginData.email"
            required
          />
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="mb-3">
        <label class="form-label">Contraseña</label>

        <div class="input-group">
          <span class="input-group-text">🔒</span>
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="••••••••"
            [(ngModel)]="loginData.password"
            required
          />
        </div>
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="btn btn-primary w-100 py-2 fw-semibold"
        [disabled]="!loginForm.valid"
      >
        Iniciar Sesión
      </button>

      <!-- ERROR -->
      <div *ngIf="errorMessage"
        class="alert alert-danger text-center mt-3 mb-0 py-2">
        {{ errorMessage }}
      </div>

    </form>

    <!-- REGISTER -->
    <div class="text-center mt-3">
      <small class="text-muted">
        ¿No tienes una cuenta?
        <a routerLink="/signup" class="text-primary fw-semibold text-decoration-none">
          Registrarse
        </a>
      </small>
    </div>

  </div>

</div>
