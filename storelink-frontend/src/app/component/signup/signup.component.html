<div class="d-flex justify-content-center align-items-center vh-100 bg-light">

  <div class="card border-0 shadow-lg p-4" style="width: 460px; border-radius: 12px;">

    <!-- HEADER -->
    <div class="text-center mb-4">
      <h3 class="fw-bold mb-1">Crear Cuenta</h3>
      <small class="text-muted">Regístrate para acceder al sistema</small>
    </div>

    <form (ngSubmit)="onSubmit()" #signupForm="ngForm" novalidate>

      <!-- NAME -->
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text"
          class="form-control"
          name="name"
          [(ngModel)]="newCustomer.name"
          #name="ngModel"
          required>
        <div *ngIf="name.invalid && name.touched" class="text-danger small mt-1">
          El nombre es obligatorio.
        </div>
      </div>

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email"
          class="form-control"
          name="email"
          [(ngModel)]="newCustomer.email"
          #email="ngModel"
          required
          email>

        <div *ngIf="email.invalid && email.touched" class="text-danger small mt-1">
          <div *ngIf="email.errors?.['required']">El correo es obligatorio.</div>
          <div *ngIf="email.errors?.['email']">Formato inválido.</div>
        </div>
      </div>

      <!-- PHONE -->
      <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="text"
          class="form-control"
          name="phone"
          [(ngModel)]="newCustomer.phone"
          #phone="ngModel"
          required
          pattern="^[0-9]{9}$">

        <div *ngIf="phone.invalid && phone.touched" class="text-danger small mt-1">
          Número de 9 dígitos.
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password"
          class="form-control"
          name="password"
          [(ngModel)]="password"
          #passwordField="ngModel"
          minlength="8"
          required>

        <div *ngIf="passwordField.invalid && passwordField.touched" class="text-danger small mt-1">
          Mínimo 8 caracteres.
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="mb-3">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password"
          class="form-control"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          #confirmPasswordField="ngModel"
          required>

        <div *ngIf="confirmPasswordField.touched && !passwordsMatch()"
          class="text-danger small mt-1">
          Las contraseñas no coinciden.
        </div>
      </div>

      <!-- BUTTON -->
      <button type="submit"
        class="btn btn-success w-100 py-2 fw-semibold"
        [disabled]="!signupForm.valid || !passwordsMatch()">
        Crear cuenta
      </button>

      <!-- MESSAGES -->
      <div *ngIf="successMessage"
        class="alert alert-success text-center mt-3 py-2 mb-0">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage"
        class="alert alert-danger text-center mt-3 py-2 mb-0">
        {{ errorMessage }}
      </div>

    </form>

  </div>

</div>
